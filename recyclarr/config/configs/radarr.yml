# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
---
radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: movie
    quality_profiles:
      - name: FC Shared Movies
        reset_unmatched_scores:
          enabled: true
        min_format_score: 4000
        min_upgrade_format_score: 4000
        upgrade:
          allowed: true
          until_quality: Remux-2160p
        quality_sort: top
        qualities:
          - name: Remux-2160p
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBRip-2160p
              - WEBDL-2160p
          - name: Remux-1080p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBRip-1080p
              - WEBDL-1080p
    custom_formats:
      - trash_ids:
          - fc-radarr-french-audio-gate
          - fc-radarr-french-audio-preferred
        assign_scores_to:
          - name: FC Shared Movies
