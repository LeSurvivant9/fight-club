# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
---
sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: series
    quality_profiles:
      - name: FC Shared Shows
        reset_unmatched_scores:
          enabled: true
        min_format_score: 4000
        min_upgrade_format_score: 4000
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        quality_sort: top
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBRip-2160p
              - WEBDL-2160p
          - name: Bluray-2160p
          - name: WEB 1080p
            qualities:
              - WEBRip-1080p
              - WEBDL-1080p
          - name: Bluray-1080p
      - name: FC Anime 1080p
        reset_unmatched_scores:
          enabled: true
        min_format_score: 4000
        min_upgrade_format_score: 4000
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
        quality_sort: top
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBRip-1080p
              - WEBDL-1080p
