---
services:
  flaresolverr:
    extends:
      file: ../common.yml
      service: common-config
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: suwayomi-flaresolverr
    environment:
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER}
      - LOG_HTML=${LOG_HTML}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - proxy
    healthcheck:
      test: [CMD-SHELL, 'curl -fsS http://localhost:8191/ >/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  suwayomi:
    extends:
      file: ../common.yml
      service: common-config
    image: ghcr.io/suwayomi/suwayomi-server
    container_name: suwayomi
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - /opt/suwayomi/data:/home/suwayomi/.local/share/Tachidesk
      - ${MEDIA}/books:/home/suwayomi/.local/share/Tachidesk/downloads
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.suwayomi-secure.entrypoints=https
      - traefik.http.routers.suwayomi-secure.rule=Host(`suwayomi.${DOMAIN}`)
      - traefik.http.routers.suwayomi-secure.tls=true
      - traefik.http.routers.suwayomi-secure.tls.certresolver=cloudflare
      - traefik.http.routers.suwayomi-secure.service=suwayomi
      - traefik.http.services.suwayomi.loadbalancer.server.port=4567
    depends_on:
      flaresolverr:
        condition: service_healthy
networks:
  proxy:
    external: true
