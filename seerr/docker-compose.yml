---
services:
  seerr:
    extends:
      file: ../common.yml
      service: common-config
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - /opt/jellyseerr/appdata/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.seerr-secure.entrypoints=https
      - traefik.http.routers.seerr-secure.rule=Host(`jellyseerr.${DOMAIN}`)
      - traefik.http.routers.seerr-secure.tls=true
      - traefik.http.routers.seerr-secure.tls.certresolver=cloudflare
      - traefik.http.routers.seerr-secure.service=seerr
      - traefik.http.services.seerr.loadbalancer.server.port=5055
      - traefik.http.routers.seerr-secure.middlewares=authentik-forwardauth@file,no-index@file
    mem_limit: 1024M
    init: true
networks:
  proxy:
    external: true
